spring.application.name=api-gateway
server.port=8080

# Eureka Discovery Registry (CRITICAL FIX: using eureka-server instead of localhost)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Enable Automatic Service Discovery Routing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- USER SERVICE ROUTES ---
spring.cloud.gateway.routes[0].id=userservice
spring.cloud.gateway.routes[0].uri=lb://userservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**, /api/v1/users/**

# --- PRODUCT SERVICE ROUTES ---
spring.cloud.gateway.routes[1].id=productservice
spring.cloud.gateway.routes[1].uri=lb://productservice
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/products/**, /api/v1/admin/products/**

# --- ORDER SERVICE ROUTES ---
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/orders/**

# --- PAYMENT SERVICE ROUTES ---
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

# --- GLOBAL CORS CONFIGURATION (For Frontend Access) ---
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET, POST, PUT, DELETE, OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*